version: '3.8'

services:
  attestation-db-api:
    build: .
    container_name: attestation-storage-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - STORAGE_DIR=/app/storage
    volumes:
      # Persist storage across container restarts
      - attestation-storage:/app/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - attestation-network

volumes:
  attestation-storage:
    driver: local

networks:
  attestation-network:
    driver: bridge