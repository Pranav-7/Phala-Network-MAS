version: '3.8'

services:
  pdf-api:
    build: .
    container_name: pdf-secure-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - STORAGE_DIR=/app/storage
      # IMPORTANT: Change this to a secure 64-character random string in production
      - SIGN_SECRET=${SIGN_SECRET}
    volumes:
      # Persist storage across container restarts
      - pdf-storage:/app/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pdf-network

volumes:
  pdf-storage:
    driver: local

networks:
  pdf-network:
    driver: bridge